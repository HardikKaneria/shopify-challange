<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Best Sellers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;500;600&family=Source+Serif+Pro:wght@900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="dist/output.css" />
  </head>
  <body class="bg-white">
    <section aria-labelledby="best-sellers-heading" class="mx-auto max-w-7xl px-4 pt-12 sm:px-6 lg:px-8">
      <div class="flex flex-col items-center gap-4 text-center sm:flex-row sm:items-center sm:justify-between sm:text-left">
        <h1
          id="best-sellers-heading"
          class="font-serif text-[40px] font-black leading-[1.2] tracking-[-0.01em] text-ink"
        >
          Best Sellers
        </h1>
        <a
          href="#"
          class="hidden items-center gap-2 font-sans text-sm font-semibold leading-[1.4] tracking-[0.03em] text-olive transition-colors hover:text-ink sm:inline-flex"
        >
          Shop All Best Sellers
          <svg
            class="h-4 w-4"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M3 8H13M13 8L9 4M13 8L9 12" />
          </svg>
        </a>
      </div>
    </section>

    <script src="js/main.js" defer></script>
  </body>
</html>
